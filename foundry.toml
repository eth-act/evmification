[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]
via_ir = true  # Needed for ModexpMontgomery (Solidity-heavy code)
gas_limit = 9999999999999  # MapFpToG2 cofactor clearing is ~1.3B gas
evm_version = "osaka"
fs_permissions = [
    { access = "read", path = "test/modexp/fixtures" },
    { access = "read", path = "test/blake2f/fixtures" },
]

[profile.benchmark]
test = "benchmark"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
